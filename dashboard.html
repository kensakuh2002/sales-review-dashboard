<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>週次販売実績レビュー</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--accent:#3b82f6;--accent2:#818cf8;--success:#22c55e;--warning:#f59e0b;--danger:#ef4444;--border:#334155;--muted:#94a3b8;--highlight:#1e3a5f}
html,body{background:var(--bg);min-height:100vh;height:100%}
body{font-family:system-ui,'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif;color:var(--text);padding:1rem 1.5rem 2rem;max-width:1440px;margin:0 auto}
#app{min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;flex-wrap:wrap;gap:.5rem}
header h1{font-size:1.4rem;color:var(--accent)}
header .meta{color:var(--muted);font-size:.82rem}
.btn{background:var(--border);color:var(--text);border:none;padding:.4rem .9rem;border-radius:6px;cursor:pointer;font-size:.8rem;font-family:inherit;transition:background .2s}
.btn:hover{background:var(--muted);color:var(--bg)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#2563eb}
.cards{display:flex;gap:.8rem;margin-bottom:1.2rem;flex-wrap:wrap}
.card{flex:1;min-width:160px;background:var(--card);border-radius:10px;padding:1rem 1.2rem;border-left:3px solid var(--accent)}
.card.g{border-left-color:var(--success)}.card.p{border-left-color:var(--accent2)}.card.y{border-left-color:var(--warning)}.card.r{border-left-color:var(--danger)}
.card .lbl{font-size:.72rem;color:var(--muted);margin-bottom:.2rem}
.card .val{font-size:1.4rem;font-weight:700}
.card .sub{font-size:.75rem;margin-top:.2rem}
.up{color:var(--success)}.dn{color:var(--danger)}.fl{color:var(--muted)}
.section{background:var(--card);border-radius:10px;padding:1rem 1.2rem;margin-bottom:1.2rem}
.section h2{font-size:1rem;margin-bottom:.7rem}
.chart-wrap{position:relative;width:100%;height:260px}
.chart-wrap canvas{width:100%!important;height:100%!important}
.tabs{display:flex;gap:.25rem;flex-wrap:wrap;margin-bottom:.8rem}
.tab{background:var(--card);color:var(--muted);border:1px solid var(--border);padding:.4rem .9rem;border-radius:6px 6px 0 0;cursor:pointer;font-size:.82rem;font-family:inherit;transition:all .2s}
.tab.on{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
.tab:hover:not(.on){background:var(--border);color:var(--text)}
.panel{display:none}.panel.on{display:block}
.panel-inner{background:var(--card);border-radius:0 10px 10px 10px;padding:1rem;overflow-x:auto}
.panel-inner h3{font-size:.9rem;margin-bottom:.6rem;color:var(--accent)}
table{width:100%;border-collapse:collapse;font-size:.78rem;table-layout:fixed}
th,td{padding:.4rem .35rem;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
th{background:rgba(59,130,246,.08);color:var(--accent);font-weight:600;position:sticky;top:0;white-space:normal;line-height:1.2;padding:.4rem .4rem}
th:first-child,td:first-child{text-align:left}
td{padding:.4rem .4rem}
.lang-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:.25rem .5rem;border-radius:4px;cursor:pointer;font-size:.75rem;font-family:inherit;margin-left:.5rem}
.lang-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
tr:hover td{background:rgba(255,255,255,.03)}
tr.sub-row td{background:var(--highlight);font-weight:600}
td.hl{background:rgba(59,130,246,.12);font-weight:700;border-left:2px solid var(--accent);border-right:2px solid var(--accent)}
th.hl{background:rgba(59,130,246,.2);border-left:2px solid var(--accent);border-right:2px solid var(--accent)}
.mini-bars{display:inline-flex;align-items:flex-end;gap:1px;height:18px;vertical-align:middle}
.mini-bars span{display:inline-block;width:5px;background:var(--accent);border-radius:1px 1px 0 0;min-height:1px}
.alert-list{list-style:none}
.alert-item{padding:.5rem .7rem;border-left:3px solid var(--warning);margin-bottom:.4rem;background:rgba(245,158,11,.06);border-radius:0 6px 6px 0;font-size:.82rem;line-height:1.5}
.alert-item.hi{border-left-color:var(--danger);background:rgba(239,68,68,.06)}
.alert-item.lo{border-left-color:var(--success);background:rgba(34,197,94,.06)}
.insight-item{padding:.6rem .8rem;margin-bottom:.5rem;border-radius:8px;font-size:.84rem;line-height:1.6}
.insight-item.good{background:rgba(34,197,94,.08);border-left:3px solid var(--success)}
.insight-item.bad{background:rgba(239,68,68,.08);border-left:3px solid var(--danger)}
.insight-item.neutral{background:rgba(59,130,246,.08);border-left:3px solid var(--accent)}
.chk-item{display:flex;align-items:flex-start;gap:.6rem;padding:.45rem 0;border-bottom:1px solid var(--border);font-size:.82rem}
.chk-item:last-child{border-bottom:none}
.chk-item input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent2);cursor:pointer;flex-shrink:0;margin-top:2px}
.chk-item label{cursor:pointer;flex:1}
.chk-item.done label{color:var(--muted);text-decoration:line-through}
.chk-item input[type=text]{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:2px 6px;font-size:.75rem;width:120px;font-family:inherit}
.badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:.68rem;font-weight:600}
.badge.hi{background:rgba(239,68,68,.2);color:var(--danger)}
.badge.md{background:rgba(245,158,11,.2);color:var(--warning)}
.badge.lo{background:rgba(34,197,94,.2);color:var(--success)}
.pbar{height:5px;background:var(--border);border-radius:3px;margin-top:.3rem;overflow:hidden}
.pbar-fill{height:100%;background:var(--accent2);border-radius:3px;transition:width .3s}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}
.online-row td{border-top:2px solid var(--border);font-style:italic;color:var(--accent2)}
.copy-toast{position:fixed;bottom:20px;right:20px;background:var(--success);color:#fff;padding:.6rem 1.2rem;border-radius:8px;font-size:.85rem;display:none;z-index:999}

</style>

function pct(now,prev){if(!prev||prev===0)return{t:'N/A',c:'fl'};const v=((now-prev)/Math.abs(prev)*100);return{t:(v>0?'+':'')+v.toFixed(0)+'%',c:v>5?'up':v<-5?'dn':'fl'}}
function avg(arr){const f=arr.filter(v=>v!=null);return f.length?f.reduce((a,b)=>a+b,0)/f.length:0}
function sum(arr){return arr.reduce((a,b)=>a+(b||0),0)}
function miniBars(arr){const mx=Math.max(...arr,1);return '<span class="mini-bars">'+arr.map(v=>'<span style="height:'+Math.max(1,Math.abs(v)/mx*18)+'px"></span>').join('')+'</span>'}

function makeTableRow(name,v4,a4,vYr4,aYr,ytd,ytdYr,cls,isHl){
  const now=v4[3],prev=v4[2],yrNow=vYr4[3];
  const wow=pct(now,prev),avg4yoy=pct(a4,aYr),ytdYoy=pct(ytd,ytdYr);
  const hlc=isHl?' class="hl"':'';
  return '<tr'+(cls?' class="'+cls+'"':'')+'><td>'+name+'</td>'
    +'<td>'+v4[0]+'</td><td>'+v4[1]+'</td><td>'+v4[2]+'</td>'
    +'<td'+hlc+'>'+now+'</td>'
    +'<td class="'+wow.c+'">'+wow.t+'</td>'
    +'<td>'+yrNow+'</td><td>'+a4.toFixed(1)+'</td><td>'+aYr.toFixed(1)+'</td>'
    +'<td class="'+avg4yoy.c+'">'+avg4yoy.t+'</td>'
    +'<td>'+fmt(ytd)+'</td><td class="'+ytdYoy.c+'">'+ytdYoy.t+'</td>'
    +'<td>'+miniBars(v4)+'</td></tr>';
}

function tableHeader(){
  return '<table style="table-layout:fixed"><colgroup><col style="width:12%">'
    +'<col style="width:6%"><col style="width:6%"><col style="width:6%"><col style="width:6%">'
    +'<col style="width:6%"><col style="width:7%"><col style="width:7%"><col style="width:7%">'
    +'<col style="width:7%"><col style="width:7%"><col style="width:7%"><col style="width:6%">'
    +'</colgroup><thead><tr><th>'+t('name')+'</th><th>'+t('w3')+'</th><th>'+t('w2')+'</th><th>'+t('w1')+'</th>'
    +'<th class="hl">'+t('thisW')+'</th><th>'+t('wowH')+'</th>'
    +'<th>'+t('yr1')+'</th><th>'+t('avg4')+'</th><th>'+t('yr4')+'</th><th>'+t('avg4yoy')+'</th>'
    +'<th>'+t('ytdH')+'</th><th>'+t('ytdYoy')+'</th><th>'+t('trend')+'</th></tr></thead><tbody>';
}

function detectAlerts(d){
  const alerts=[];
  d.categories.forEach(cat=>{
    const now=cat.sub4[3],a4=avg(cat.sub4);
    if(a4>0&&now>a4*2&&(now-a4)>=3) alerts.push({lv:'hi',prod:cat.name,ret:'全体',msg:'今週'+now+'台、4週平均'+a4.toFixed(0)+'台の'+((now/a4-1)*100).toFixed(0)+'%増'});
    if(a4>=3&&now<a4*0.5) alerts.push({lv:'hi',prod:cat.name,ret:'全体',msg:'今週'+now+'台に急減（4週平均'+a4.toFixed(0)+'台）'});
    cat.retailers.forEach(r=>{
      const rn=r.v4[3],ra=avg(r.v4),p3z=r.v4[0]===0&&r.v4[1]===0&&r.v4[2]===0;
      if(p3z&&rn>=3) alerts.push({lv:'hi',prod:cat.name,ret:r.name,msg:rn+'台の突発販売（前3週ゼロ）。大口注文か確認要'});
      if(ra>2&&rn>ra*2&&(rn-ra)>=3) alerts.push({lv:'md',prod:cat.name,ret:r.name,msg:'今週'+rn+'台（4週平均'+ra.toFixed(0)+'台、'+((rn/ra-1)*100).toFixed(0)+'%増）'});
      if(ra>=3&&rn===0) alerts.push({lv:'md',prod:cat.name,ret:r.name,msg:'今週ゼロ（4週平均'+ra.toFixed(0)+'台）。販売停止の可能性'});
      if(ra>=3&&rn>0&&rn<ra*0.5) alerts.push({lv:'md',prod:cat.name,ret:r.name,msg:'今週'+rn+'台に減少（4週平均'+ra.toFixed(0)+'台）'});
    });
  });
  const ns=d.net12,nsNow=ns[11],nsA=avg(ns.slice(8));
  if(nsNow>nsA*1.3) alerts.push({lv:'lo',prod:'全体',ret:'Net Sales',msg:'今週'+nsNow+'台、4週平均'+nsA.toFixed(0)+'台を'+((nsNow/nsA-1)*100).toFixed(0)+'%上回る好調'});
  if(nsNow<nsA*0.7) alerts.push({lv:'md',prod:'全体',ret:'Net Sales',msg:'今週'+nsNow+'台、4週平均'+nsA.toFixed(0)+'台を'+((1-nsNow/nsA)*100).toFixed(0)+'%下回る'});
  return alerts.sort((a,b)=>({hi:0,md:1,lo:2}[a.lv])-({hi:0,md:1,lo:2}[b.lv]));
}

function generateInsights(d){
  const ins=[];
  const ns=d.net12,now=ns[11],prev=ns[10],a4=avg(ns.slice(8));
  const diff=now-prev;
  var u=t('unit'),en=LANG==='en',sep=en?', ':'、';

  // 1) Overall WoW + breakdown
  var prodChanges=[];
  d.categories.forEach(function(cat){
    var cn=cat.sub4[3],cp=cat.sub4[2],cd=cn-cp;
    if(cd!==0) prodChanges.push({name:cat.name,d:cd,now:cn,prev:cp});
  });
  prodChanges.sort(function(a,b){return Math.abs(b.d)-Math.abs(a.d)});
  var upProds=prodChanges.filter(function(p){return p.d>0}).map(function(p){return p.name+' +'+p.d}).join(sep);
  var dnProds=prodChanges.filter(function(p){return p.d<0}).map(function(p){return p.name+' '+p.d}).join(sep);
  if(diff>0){
    ins.push({c:'good',t:en
      ?'📈 <strong>Net Sales WoW +'+diff+' units</strong> ('+prev+'→'+now+'). Increase: '+(upProds||'—')+(dnProds?'. Decrease: '+dnProds:'')
      :'📈 <strong>Net Sales前週比 +'+diff+'台</strong>（'+prev+'→'+now+'台）。増加の内訳: '+(upProds||'—')+(dnProds?'。減少: '+dnProds:'')});
  } else if(diff<0){
    ins.push({c:'bad',t:en
      ?'📉 <strong>Net Sales WoW '+diff+' units</strong> ('+prev+'→'+now+'). Decrease: '+(dnProds||'—')+(upProds?'. Increase: '+upProds:'')
      :'📉 <strong>Net Sales前週比 '+diff+'台</strong>（'+prev+'→'+now+'台）。減少の内訳: '+(dnProds||'—')+(upProds?'。増加: '+upProds:'')});
  } else {
    ins.push({c:'neutral',t:en
      ?'📊 <strong>Net Sales WoW flat</strong> ('+now+' units)'
      :'📊 <strong>Net Sales前週比 横ばい</strong>（'+now+'台）'});
  }

  // 2) Product-level WoW + retailer breakdown
  d.categories.forEach(function(cat){
    var cn=cat.sub4[3],cp=cat.sub4[2],ca=avg(cat.sub4);
    if(ca<2) return;
    var wowD=cn-cp,trendD=cn-ca;
    if(Math.abs(wowD)<3&&Math.abs(trendD)<3) return;

    var retChanges=[];
    cat.retailers.forEach(function(r){
      var rn=r.v4[3],rp=r.v4[2],rd=rn-rp;
      if(rd!==0) retChanges.push({name:r.name,d:rd,now:rn,prev:rp});
    });
    retChanges.sort(function(a,b){return Math.abs(b.d)-Math.abs(a.d)});
    var topChanges=retChanges.slice(0,3).map(function(r){return r.name+(r.d>0?' +':' ')+r.d+(en?' units':'台')}).join(sep);
    var keyLabel=en?'Key changes: ':'主な変動: ';

    if(wowD>0&&wowD>=3){
      ins.push({c:'good',t:en
        ?'⬆️ <strong>'+cat.name+'</strong>: WoW +'+wowD+' ('+cp+'→'+cn+'). '+(topChanges?keyLabel+topChanges:'')
        :'⬆️ <strong>'+cat.name+'</strong>: 前週比+'+wowD+'台（'+cp+'→'+cn+'台）。'+(topChanges?keyLabel+topChanges:'')});
    } else if(wowD<0&&wowD<=-3){
      ins.push({c:'bad',t:en
        ?'⬇️ <strong>'+cat.name+'</strong>: WoW '+wowD+' ('+cp+'→'+cn+'). '+(topChanges?keyLabel+topChanges:'')
        :'⬇️ <strong>'+cat.name+'</strong>: 前週比'+wowD+'台（'+cp+'→'+cn+'台）。'+(topChanges?keyLabel+topChanges:'')});
    }

    if(ca>=5&&cn>ca*1.4&&Math.abs(wowD)<3){
      ins.push({c:'good',t:en
        ?'📊 <strong>'+cat.name+'</strong>: '+cn+' units, above 4w avg ('+ca.toFixed(0)+'). '+(topChanges?'Breakdown: '+topChanges:'')
        :'📊 <strong>'+cat.name+'</strong>: 4週平均('+ca.toFixed(0)+'台)を上回る'+cn+'台で推移。'+(topChanges?'内訳: '+topChanges:'')});
    }
    if(ca>=5&&cn<ca*0.6&&Math.abs(wowD)<3){
      ins.push({c:'bad',t:en
        ?'📊 <strong>'+cat.name+'</strong>: '+cn+' units, below 4w avg ('+ca.toFixed(0)+'). '+(topChanges?'Breakdown: '+topChanges:'')
        :'📊 <strong>'+cat.name+'</strong>: 4週平均('+ca.toFixed(0)+'台)を下回る'+cn+'台。'+(topChanges?'内訳: '+topChanges:'')});
    }
  });

  // 3) Top retailer-level changes
  var bigRetChanges=[];
  d.categories.forEach(function(cat){
    cat.retailers.forEach(function(r){
      var rn=r.v4[3],rp=r.v4[2],rd=rn-rp,ra=avg(r.v4);
      if(Math.abs(rd)>=5||(ra>=3&&Math.abs(rd)>=3)){
        bigRetChanges.push({prod:cat.name,ret:r.name,d:rd,now:rn,prev:rp,avg:ra});
      }
    });
  });
  bigRetChanges.sort(function(a,b){return Math.abs(b.d)-Math.abs(a.d)});
  bigRetChanges.slice(0,3).forEach(function(r){
    if(r.d>0){
      ins.push({c:'good',t:en
        ?'🏪 <strong>'+r.prod+' / '+r.ret+'</strong>: +'+r.d+' ('+r.prev+'→'+r.now+', 4w avg '+r.avg.toFixed(0)+')'
        :'🏪 <strong>'+r.prod+' / '+r.ret+'</strong>: +'+r.d+'台（'+r.prev+'→'+r.now+'台、4週平均'+r.avg.toFixed(0)+'台）'});
    } else {
      ins.push({c:'bad',t:en
        ?'🏪 <strong>'+r.prod+' / '+r.ret+'</strong>: '+r.d+' ('+r.prev+'→'+r.now+', 4w avg '+r.avg.toFixed(0)+')'
        :'🏪 <strong>'+r.prod+' / '+r.ret+'</strong>: '+r.d+'台（'+r.prev+'→'+r.now+'台、4週平均'+r.avg.toFixed(0)+'台）'});
    }
  });

  return ins;
}

  const wow=pct(now,prev);

  const ytdYoy=d.ytdNet&&d.ytdNetYr?pct(d.ytdNet,d.ytdNetYr):{t:'N/A',c:'fl'};

    +'<div class="card"><div class="lbl">'+t('thisWeek')+'</div><div class="val">'+fmt(now)+'<span style="font-size:.65rem">'+u+'</span></div><div class="sub '+wow.c+'">'+t('wow')+' '+wow.t+'</div></div>'
    +'<div class="card g"><div class="lbl">'+t('avg4_8')+'</div><div class="val">'+fmt(Math.round(a4))+'<span style="font-size:.65rem">'+u+'</span></div><div class="sub fl">'+t('avg8')+': '+fmt(Math.round(a8))+u+'</div></div>'
    +'<div class="card p"><div class="lbl">'+t('lastYr')+'</div><div class="val">'+fmt(yrNow)+'<span style="font-size:.65rem">'+u+'</span></div><div class="sub '+yoy.c+'">YoY '+yoy.t+'</div></div>'
    +'<div class="card y"><div class="lbl">'+t('ytd')+'</div><div class="val">'+fmt(d.ytdNet||0)+'<span style="font-size:.65rem">'+u+'</span></div><div class="sub '+ytdYoy.c+'">YTD YoY '+ytdYoy.t+'</div></div>'
    +'<div class="card '+(alerts.length>5?'r':'y')+'"><div class="lbl">'+t('alerts')+'</div><div class="val">'+alerts.length+'<span style="font-size:.65rem">'+t('items')+'</span></div><div class="sub fl">'+t('check')+'</div></div>'
    +'</div>';

  // Chart with tabs
  h+='<div class="section">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;margin-bottom:.6rem">';
  h+='<div class="tabs" style="margin-bottom:0"><button class="tab on" data-ct="overall">'+t('chart')+'</button><button class="tab" data-ct="product">'+(LANG==='en'?'📊 Product Chart':'📊 製品別チャート')+'</button></div>';
  h+='<div id="chartControls" style="display:none;gap:.5rem;align-items:center;flex-wrap:wrap;font-size:.78rem">';
  // Product select
  h+='<select id="chartProd" style="background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:3px 6px;font-size:.78rem;font-family:inherit">';
  d.categories.forEach(function(c){h+='<option value="'+c.name+'">'+c.name+'</option>';});
  h+='</select>';
  // Period select
  h+='<select id="chartPeriod" style="background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:3px 6px;font-size:.78rem;font-family:inherit">';
  h+='<option value="13">13'+(LANG==='en'?' weeks':'週')+'</option><option value="26">26'+(LANG==='en'?' weeks':'週')+'</option></select>';
  // Retailer checkboxes
  h+='<label style="display:flex;align-items:center;gap:3px;font-size:.75rem;color:var(--accent);padding:2px 5px;border:1px solid var(--accent);border-radius:3px;cursor:pointer"><input type="checkbox" id="chartShowTotal" checked style="width:12px;height:12px;accent-color:var(--accent)"> '+(LANG==='en'?'Total':t('total'))+'</label>';
h+='<div id="chartRetailers" style="display:flex;gap:.4rem;flex-wrap:wrap"></div>';
  h+='</div></div>';
  h+='<div class="chart-wrap"><canvas id="chart"></canvas></div></div>';

  // Store chart state
  window._chartState={mode:'overall',prod:d.categories[0].name,period:13,retailers:[]};

  // Overall summary table
  h+='<div class="section"><h2>'+t('summary')+'</h2>';
  h+=tableHeader();

  h+=makeTableRow('<strong>'+t('netTotal')+'</strong>',nsV4,nsA4,nsYr4,nsYrA,d.ytdNet||0,d.ytdNetYr||0,'sub-row',true);

    }
    onYtd+=(cat.onlineYtd||0);allYtd+=(cat.ytd||0);
    onYtdYr+=(cat.onlineYtdYr||0);allYtdYr+=(cat.ytdYr||0);

  h+='<td>'+opct(onTotal[1],allTotal[1])+'</td>';
  h+='<td>'+opct(onTotal[2],allTotal[2])+'</td>';

  h+='<td></td>'; // 前週比 skip

  h+='<td></td>'; // 4wYoY skip
  h+='<td>'+opct(onYtd,allYtd)+'</td>'; // YTD
  h+='<td></td>'; // YTD YoY skip
  h+='<td></td></tr>'; // 推移 skip
  h+='</tbody></table></div>';

  // Product tabs

  h+='<div class="section"><h2>'+t('prodAnalysis')+'</h2><div class="tabs" id="tabBar">';
  d.categories.forEach(function(c){h+='<button class="tab'+(c.name===biggest.name?' on':'')+'" data-t="'+c.name+'">'+c.name+'</button>';});
  h+='</div><div id="panels">';
  d.categories.forEach(function(cat){
    var cn=cat.sub4[3],cwow=pct(cn,cat.sub4[2]);
    h+='<div class="panel'+(cat.name===biggest.name?' on':'')+'" id="p-'+cat.name+'"><div class="panel-inner">';
    h+='<h3>'+cat.name+' ('+cat.sku+') — '+t('thisW').replace('\n',' ')+' <span style="font-size:1.2rem;font-weight:700">'+cn+'</span>'+u+' <span class="'+cwow.c+'">'+cwow.t+'</span></h3>';
    h+=tableHeader();
    h+=makeTableRow('<strong>'+t('total')+'</strong>',cat.sub4,avg(cat.sub4),cat.subYr4,avg(cat.subYr4),cat.ytd||0,cat.ytdYr||0,'sub-row',true);
    cat.retailers.forEach(function(r){
      h+=makeTableRow(r.name,r.v4,avg(r.v4),r.vYr4,avg(r.vYr4),r.ytd||0,r.ytdYr||0,'',true);
    });
    h+='</tbody></table></div></div>';
  });
  h+='</div></div>';

  // Insights
  h+='<div class="section"><h2 style="color:var(--accent)">'+t('insights')+'</h2>';
  insights.forEach(function(i){h+='<div class="insight-item '+i.c+'">'+i.t+'</div>';});
  h+='</div>';

  // Alerts
  h+='<div class="section"><h2 style="color:var(--warning)">'+t('alertTitle')+' ('+alerts.length+')</h2><ul class="alert-list">';
  if(alerts.length===0) h+='<li style="color:var(--success)">'+t('noAlert')+'</li>';
  else alerts.forEach(function(a){
    h+='<li class="alert-item '+a.lv+'">'+(a.lv==='hi'?'🔴':a.lv==='md'?'🟡':'🟢')+' <strong>'+a.prod+' '+a.ret+'</strong>: '+a.msg+'</li>';
  });
  h+='</ul></div>';

  // Checklist
  h+='<div class="two-col"><div class="section"><h2 style="color:var(--accent2)">'+t('checklist')+'</h2><div id="chklist">';
  alerts.forEach(function(a,i){
    h+='<div class="chk-item" id="ci-'+i+'"><input type="checkbox" id="chk-'+i+'"><span class="badge '+(a.lv==='hi'?'hi':a.lv==='md'?'md':'lo')+'">'+t(a.lv)+'</span><label for="chk-'+i+'"><strong>'+a.ret+'</strong>: '+a.prod+' '+a.msg+'</label><input type="text" placeholder="メモ..." id="memo-'+i+'"></div>';
  });
  h+='</div><div style="margin-top:.6rem;display:flex;gap:.5rem;flex-wrap:wrap">'
    +'<button class="btn btn-primary" id="btnCopy">'+t('copy')+'</button>'
    +'<button class="btn" id="btnReset">'+t('reset')+'</button></div>'
    +'<div style="margin-top:.4rem;font-size:.72rem;color:var(--muted)"><span id="prog">0/'+alerts.length+' '+t('done')+'</span><div class="pbar"><div class="pbar-fill" id="pbar" style="width:0%"></div></div></div></div>';

  // Data summary
  h+='<div class="section"><h2>'+t('dataOverview')+'</h2><div style="font-size:.8rem;line-height:1.8;color:var(--muted)">'
    +'📅 '+t('week')+': '+d.lastDate+'<br>📦 '+t('product')+': '+d.categories.length+'<br>'
    +'🏪 '+t('retailer')+': '+d.categories.reduce(function(s,c){return s+c.retailers.length},0)+'<br>'
    +'⚠️ '+t('alerts')+': '+alerts.length+'<br>'
    +'📈 Net Sales: '+now+u+' ('+t('wow')+' '+wow.t+')<br>'
    +'📅 YTD: '+fmt(d.ytdNet||0)+u+' (YoY '+ytdYoy.t+')'
    +'</div></div></div>';

  document.getElementById('app').innerHTML=h;
  drawChart(d.dates12,d.net12,d.netYr12);
  setupChartTabs(d);

  // Product tab switching (not chart tabs)
  document.querySelectorAll('#tabBar .tab').forEach(function(b){b.addEventListener('click',function(){
    document.querySelectorAll('#tabBar .tab').forEach(function(tb){tb.classList.toggle('on',tb===b)});
    document.querySelectorAll('.panel').forEach(function(p){p.classList.toggle('on',p.id==='p-'+b.dataset.t)});
  })});

  // Checklist localStorage
  var sk='sr_'+d.lastDate,sv={};
  try{sv=JSON.parse(localStorage.getItem(sk))||{}}catch(e){}
  alerts.forEach(function(_,i){
    var cb=document.getElementById('chk-'+i),me=document.getElementById('memo-'+i),ci=document.getElementById('ci-'+i);
    if(!cb)return;
    if(sv['c'+i]){cb.checked=true;ci.classList.add('done')}
    if(sv['m'+i])me.value=sv['m'+i];
    cb.addEventListener('change',function(){sv['c'+i]=cb.checked;ci.classList.toggle('done',cb.checked);save();upProg()});
    me.addEventListener('input',function(){sv['m'+i]=me.value;save()});
  });
  function save(){try{localStorage.setItem(sk,JSON.stringify(sv))}catch(e){}}
  function upProg(){
    var done=alerts.filter(function(_,i){return sv['c'+i]}).length;
    document.getElementById('prog').textContent=done+'/'+alerts.length+' '+t('done');
    document.getElementById('pbar').style.width=(done/Math.max(alerts.length,1)*100)+'%';
  }
  upProg();

  document.getElementById('btnCopy').addEventListener('click',function(){
    var txt=t('title')+' '+d.lastDate+'\n\n';
    insights.forEach(function(i){txt+=i.t.replace(/<[^>]*>/g,'')+'\n'});
    txt+='\n';
    alerts.forEach(function(a,i){
      txt+='['+(sv['c'+i]?'✓':'☐')+'] ['+t(a.lv)+'] '+a.prod+' '+a.ret+': '+a.msg;
      if(sv['m'+i])txt+=' → '+sv['m'+i];
      txt+='\n';
    });
    navigator.clipboard.writeText(txt).then(function(){
      var toast=document.getElementById('toast');toast.textContent=t('copied');toast.style.display='block';setTimeout(function(){toast.style.display='none'},2000);
    });
  });

  document.getElementById('btnReset').addEventListener('click',function(){
    if(!confirm(t('resetConfirm')))return;
    sv={};save();alerts.forEach(function(_,i){
      var cb=document.getElementById('chk-'+i),me=document.getElementById('memo-'+i),ci=document.getElementById('ci-'+i);
      if(cb)cb.checked=false;if(me)me.value='';if(ci)ci.classList.remove('done');
    });upProg();
  });

  window.addEventListener('resize',function(){drawChart(d.dates12,d.net12,d.netYr12)});
}

function drawChart(labels,data,dataYr){
  var canvas=document.getElementById('chart');if(!canvas)return;
  var ctx=canvas.getContext('2d'),container=canvas.parentElement;
  var dpr=window.devicePixelRatio||1,w=container.clientWidth,h=container.clientHeight;
  canvas.width=w*dpr;canvas.height=h*dpr;canvas.style.width=w+'px';canvas.style.height=h+'px';ctx.scale(dpr,dpr);
  var pad={top:25,right:25,bottom:40,left:55},cw=w-pad.left-pad.right,ch=h-pad.top-pad.bottom;
  var allVals=data.concat(dataYr||[]);
  var mx=Math.max.apply(null,allVals)*1.1||1,mn=Math.min.apply(null,allVals.filter(function(v){return v>0}))*0.8||0;
  var rng=mx-mn||1;
  // Grid
  ctx.strokeStyle='#334155';ctx.lineWidth=.5;ctx.fillStyle='#94a3b8';ctx.font='10px system-ui';ctx.textAlign='right';
  for(var i=0;i<=4;i++){var y=pad.top+(ch/4)*i,v=mx-(rng/4)*i;ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(w-pad.right,y);ctx.stroke();ctx.fillText(Math.round(v)+'台',pad.left-6,y+3)}
  ctx.textAlign='center';var sx=cw/(labels.length-1||1);
  labels.forEach(function(l,i){ctx.fillText(l,pad.left+sx*i,h-pad.bottom+18)});
  // YoY line (behind)
  if(dataYr&&dataYr.length){
    ctx.beginPath();ctx.strokeStyle='rgba(148,163,184,0.5)';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
    dataYr.forEach(function(v,i){var x=pad.left+sx*i,y2=pad.top+ch-((v-mn)/rng)*ch;i===0?ctx.moveTo(x,y2):ctx.lineTo(x,y2)});
    ctx.stroke();ctx.setLineDash([]);
    // YoY points
    dataYr.forEach(function(v,i){var x=pad.left+sx*i,y2=pad.top+ch-((v-mn)/rng)*ch;ctx.beginPath();ctx.arc(x,y2,2,0,Math.PI*2);ctx.fillStyle='rgba(148,163,184,0.5)';ctx.fill()});
  }
  // 4w moving avg
  ctx.beginPath();ctx.strokeStyle='#f59e0b';ctx.lineWidth=1.5;ctx.setLineDash([5,3]);
  for(var i=3;i<data.length;i++){var a=(data[i]+data[i-1]+data[i-2]+data[i-3])/4,x=pad.left+sx*i,y=pad.top+ch-((a-mn)/rng)*ch;i===3?ctx.moveTo(x,y):ctx.lineTo(x,y)}
  ctx.stroke();ctx.setLineDash([]);
  // Area
  var grad=ctx.createLinearGradient(0,pad.top,0,pad.top+ch);grad.addColorStop(0,'rgba(59,130,246,.2)');grad.addColorStop(1,'rgba(59,130,246,.01)');
  ctx.beginPath();data.forEach(function(v,i){var x=pad.left+sx*i,y=pad.top+ch-((v-mn)/rng)*ch;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});
  ctx.lineTo(pad.left+sx*(data.length-1),pad.top+ch);ctx.lineTo(pad.left,pad.top+ch);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
  // Line
  ctx.beginPath();ctx.strokeStyle='#3b82f6';ctx.lineWidth=2.5;ctx.lineJoin='round';
  data.forEach(function(v,i){var x=pad.left+sx*i,y=pad.top+ch-((v-mn)/rng)*ch;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});ctx.stroke();
  // Points
  data.forEach(function(v,i){var x=pad.left+sx*i,y=pad.top+ch-((v-mn)/rng)*ch;ctx.beginPath();ctx.arc(x,y,3.5,0,Math.PI*2);ctx.fillStyle=i===data.length-1?'#f59e0b':'#3b82f6';ctx.fill();ctx.strokeStyle='#0f172a';ctx.lineWidth=1.5;ctx.stroke()});
  // Last value
  var lx=pad.left+sx*(data.length-1),ly=pad.top+ch-((data[data.length-1]-mn)/rng)*ch;
  ctx.fillStyle='#f59e0b';ctx.font='bold 11px system-ui';ctx.textAlign='center';ctx.fillText(data[data.length-1]+t('unit'),lx,ly-10);
  // Legend
  ctx.font='9px system-ui';ctx.textAlign='right';
  ctx.fillStyle='#3b82f6';ctx.fillText('● '+t('lgdThis'),w-pad.right-120,pad.top-6);
  ctx.fillStyle='#94a3b8';ctx.fillText('--- '+t('lgdLast'),w-pad.right-60,pad.top-6);
  ctx.fillStyle='#f59e0b';ctx.fillText('--- '+t('lgdAvg'),w-pad.right,pad.top-6);
}

// Product chart with multiple retailer lines
var COLORS=['#3b82f6','#22c55e','#f59e0b','#ef4444','#a855f7','#ec4899','#14b8a6','#f97316','#6366f1','#84cc16'];

function drawProductChart(d){
  var st=window._chartState;
  var cat=d.categories.find(function(c){return c.name===st.prod});
  if(!cat)return;
  var n=st.period,is26=n===26;
  var labels=is26?(d.dates26||[]):(d.dates26||[]).slice(-13);
  if(!labels.length) labels=d.dates12;

  // Collect series: total + selected retailers
  var series=[];
  var totalData=is26?(cat.sub26||cat.sub8):(cat.sub26||cat.sub8).slice(-13);
  if(totalData.length<n) totalData=cat.sub8.slice(-n);
  var showTotal=document.getElementById('chartShowTotal');
  if(!showTotal||showTotal.checked) series.push({name:t('total'),data:totalData,color:'#3b82f6',width:2.5,dash:[]});

  st.retailers.forEach(function(rn,idx){
    var ret=cat.retailers.find(function(r){return r.name===rn});
    if(!ret)return;
    var rd=is26?(ret.v26||ret.v8):(ret.v26||ret.v8).slice(-13);
    if(rd.length<n) rd=ret.v8.slice(-n);
    series.push({name:rn,data:rd,color:COLORS[(idx+1)%COLORS.length],width:1.8,dash:[]});
  });

  // Draw
  var canvas=document.getElementById('chart');if(!canvas)return;
  var ctx=canvas.getContext('2d'),container=canvas.parentElement;
  var dpr=window.devicePixelRatio||1,w=container.clientWidth,h=container.clientHeight;
  canvas.width=w*dpr;canvas.height=h*dpr;canvas.style.width=w+'px';canvas.style.height=h+'px';ctx.scale(dpr,dpr);
  var pad={top:30,right:25,bottom:40,left:55},cw=w-pad.left-pad.right,ch=h-pad.top-pad.bottom;

  // Find min/max across all series
  var allV=[];
  series.forEach(function(s){s.data.forEach(function(v){if(typeof v==='number')allV.push(v)})});
  var mx=Math.max.apply(null,allV)*1.1||1,mn=Math.min.apply(null,allV.filter(function(v){return v>=0}))*0.8||0;
  var rng=mx-mn||1;

  // Grid
  ctx.strokeStyle='#334155';ctx.lineWidth=.5;ctx.fillStyle='#94a3b8';ctx.font='10px system-ui';ctx.textAlign='right';
  for(var i=0;i<=4;i++){var y=pad.top+(ch/4)*i,v=mx-(rng/4)*i;ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(w-pad.right,y);ctx.stroke();ctx.fillText(Math.round(v),pad.left-6,y+3)}
  // X labels
  ctx.textAlign='center';var sx=cw/(labels.length-1||1);
  labels.forEach(function(l,i){if(i%Math.ceil(labels.length/13)===0||i===labels.length-1)ctx.fillText(l,pad.left+sx*i,h-pad.bottom+18)});

  // Draw each series
  series.forEach(function(s){
    if(!s.data||!s.data.length)return;
    ctx.beginPath();ctx.strokeStyle=s.color;ctx.lineWidth=s.width;ctx.lineJoin='round';
    if(s.dash.length)ctx.setLineDash(s.dash);else ctx.setLineDash([]);
    s.data.forEach(function(v,i){
      var x=pad.left+sx*i,y=pad.top+ch-((v-mn)/rng)*ch;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.stroke();ctx.setLineDash([]);
    // Points
    s.data.forEach(function(v,i){
      var x=pad.left+sx*i,y=pad.top+ch-((v-mn)/rng)*ch;
      ctx.beginPath();ctx.arc(x,y,2.5,0,Math.PI*2);ctx.fillStyle=s.color;ctx.fill();
    });
  });

  // Legend
  ctx.font='9px system-ui';ctx.textAlign='left';
  var lx=pad.left+10,ly=pad.top+2;
  series.forEach(function(s,i){
    ctx.fillStyle=s.color;
    ctx.fillRect(lx,ly+i*14,12,3);
    ctx.fillText(s.name,lx+16,ly+i*14+4);
  });
}

function setupChartTabs(d){
  // Chart tab switching
  document.querySelectorAll('[data-ct]').forEach(function(b){
    b.addEventListener('click',function(){
      document.querySelectorAll('[data-ct]').forEach(function(tb){tb.classList.toggle('on',tb===b)});
      var mode=b.dataset.ct;
      window._chartState.mode=mode;
      var ctrl=document.getElementById('chartControls');
      if(mode==='product'){
        ctrl.style.display='flex';
        updateRetailerCheckboxes(d);
        drawProductChart(d);
      } else {
        ctrl.style.display='none';
        drawChart(d.dates12,d.net12,d.netYr12);
      }
    });
  });

  // Product select change
  var prodSel=document.getElementById('chartProd');
  if(prodSel) prodSel.addEventListener('change',function(){
    window._chartState.prod=this.value;
    window._chartState.retailers=[];
    updateRetailerCheckboxes(d);
    drawProductChart(d);
  });

  // Total toggle
  var totalCb=document.getElementById('chartShowTotal');
  if(totalCb) totalCb.addEventListener('change',function(){drawProductChart(d)});

  // Period select change
  var periodSel=document.getElementById('chartPeriod');
  if(periodSel) periodSel.addEventListener('change',function(){
    window._chartState.period=parseInt(this.value);
    drawProductChart(d);
  });
}

function updateRetailerCheckboxes(d){
  var cat=d.categories.find(function(c){return c.name===window._chartState.prod});
  if(!cat)return;
  var container=document.getElementById('chartRetailers');
  if(!container)return;
  container.innerHTML='';
  window._chartState.retailers=[];
  cat.retailers.forEach(function(r,i){
    var id='cr_'+i;
    var lbl=document.createElement('label');
    lbl.style.cssText='display:flex;align-items:center;gap:2px;cursor:pointer;color:'+COLORS[(i+1)%COLORS.length]+';font-size:.75rem;padding:2px 5px;border:1px solid var(--border);border-radius:3px';
    lbl.innerHTML='<input type="checkbox" id="'+id+'" style="width:12px;height:12px;accent-color:'+COLORS[(i+1)%COLORS.length]+'"> '+r.name;
    container.appendChild(lbl);
    var cb=lbl.querySelector('input');
    cb.addEventListener('change',function(){
      if(cb.checked){
        window._chartState.retailers.push(r.name);
      } else {
        window._chartState.retailers=window._chartState.retailers.filter(function(n){return n!==r.name});
      }
      drawProductChart(DATA);
    });
  });
}

window.switchLang=function(lang){LANG=lang;render(DATA)};

render(DATA);
})();

</script>
