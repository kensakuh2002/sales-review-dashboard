<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>週次販売実績レビュー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,'Hiragino Sans',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
#login{text-align:center;padding:2rem}
#login h1{font-size:1.6rem;color:#3b82f6;margin-bottom:.5rem}
#login p{color:#94a3b8;font-size:.85rem;margin-bottom:1.5rem}
.login-box{background:#1e293b;border-radius:12px;padding:2rem 2.5rem;max-width:380px;margin:0 auto}
.login-box label{display:block;text-align:left;font-size:.8rem;color:#94a3b8;margin-bottom:.3rem}
.login-box input[type=password]{width:100%;padding:.6rem .8rem;background:#0f172a;border:1px solid #334155;color:#e2e8f0;border-radius:6px;font-size:.95rem;margin-bottom:1rem;font-family:inherit}
.login-box input:focus{outline:none;border-color:#3b82f6}
.login-box button{width:100%;padding:.6rem;background:#3b82f6;color:#fff;border:none;border-radius:6px;font-size:.9rem;cursor:pointer;font-family:inherit}
.login-box button:hover{background:#2563eb}
#error{color:#ef4444;font-size:.8rem;margin-top:.5rem;min-height:1.2em}
</style>
</head>
<body>
<div id="login">
  <h1>📊 週次販売実績レビュー</h1>
  <p>このダッシュボードはパスワードで保護されています</p>
  <div class="login-box">
    <label for="pw">パスワード</label>
    <input type="password" id="pw" placeholder="パスワードを入力..." autofocus>
    <button onclick="tryLogin()">ログイン</button>
    <div id="error"></div>
  </div>
</div>
<script>
var H="6850c02f3c2b6747f973da557d8edf9f49fc81a8245856b235cb1ebc10b7effa";
async function sha256(m){
  var b=new TextEncoder().encode(m);
  var h=await crypto.subtle.digest("SHA-256",b);
  return Array.from(new Uint8Array(h)).map(function(b){return b.toString(16).padStart(2,"0")}).join("");
}
document.getElementById("pw").addEventListener("keydown",function(e){
  if(e.key==="Enter") tryLogin();
});
if(sessionStorage.getItem("sr_auth")==="1") window.location.href="dashboard.html";
async function tryLogin(){
  var pw=document.getElementById("pw").value;
  var h=await sha256(pw);
  if(h===H){
    sessionStorage.setItem("sr_auth","1");
    window.location.href="dashboard.html";
  } else {
    document.getElementById("error").textContent="パスワードが正しくありません";
  }
}
</script>
</body>
</html>
