async function sha256(m){const b=new TextEncoder().encode(m);const h=await crypto.subtle.digest("SHA-256",b);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,"0")).join("")}
document.getElementById("pw").addEventListener("keydown",function(e){if(e.key==="Enter")tryLogin()});
if(sessionStorage.getItem("sr_auth")==="1")showDashboard();
async function tryLogin(){
  const pw=document.getElementById("pw").value;
  const h=await sha256(pw);
  if(h===H){sessionStorage.setItem("sr_auth","1");showDashboard()}
  else{document.getElementById("error").textContent="❌ パスワードが正しくありません"}
}
function showDashboard(){
  // Base64 decode with proper UTF-8 handling
  const bytes=Uint8Array.from(atob(D),c=>c.charCodeAt(0));
  const decoded=new TextDecoder("utf-8").decode(bytes);
  document.open();
  document.write(decoded);
  document.close();
}
